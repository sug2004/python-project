{% extends "base.html" %}

{% block title %}Student Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>Edit Profile</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <input type="text" name="branch" class="form-control" value="{{ student.branch }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">CGPA</label>
                        <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact</label>
                        <input type="text" name="contact" class="form-control" value="{{ student.contact }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Resume (PDF/DOC/DOCX)</label>
                        <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
                        {% if student.resume %}
                            <small class="text-muted">Current: <a href="{{ url_for('static', filename='uploads/' + student.resume) }}" target="_blank">{{ student.resume }}</a></small>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary">Update Profile</button>
                    <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
